name: Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip wheel
          # Kern-Dependencies (klein gehalten, keine ML/LLM fuer Tests)
          pip install pypdf python-docx pytesseract pdf2image Pillow
          pip install langdetect python-slugify PyYAML watchdog httpx
          pip install pytest
          # Tray-App-Dependencies (macOS-only)
          pip install rumps || true

      - name: Tesseract (fuer reader.py Tests falls vorhanden)
        run: brew install tesseract tesseract-lang poppler

      - name: pytest
        run: pytest tests/ -v --tb=short
